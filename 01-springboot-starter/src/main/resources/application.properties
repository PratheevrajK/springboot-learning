spring.application.name=mycoolapp

# Use wildcard "*" to expose all endpoints
# Can also expose individual endpoints with a comma-delimited list
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
management.endpoints.web.exposure.exclude=beans,mappings

# Actuator info endpoint details goes here
info.app.name=My Super Cool App
info.app.description=A crazy fun app, yoohoo!
info.app.version=1.0.0

# Custom application properties
coach.name=Mr. Micky Mouse
team.name=The Mouse Club

# Change SpringBoot embedded server port
server.port=7070

# Set the context path of the application
server.servlet.context-path=/mycoolapp
